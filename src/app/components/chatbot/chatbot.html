<div class="chatbot-toggle" (click)="toggle()">💬</div>

<div class="chat-window" *ngIf="open">
  <div class="header">
    TwinkleBot
  </div>

  <div class="messages">
    <div
      *ngFor="let msg of messages"
      class="message"
      [class.user]="msg.from === 'user'"
      [class.bot]="msg.from === 'bot'"
    >
      <div class="text" [innerHTML]="msg.text"></div>

      <a
        *ngIf="msg.action === 'openToy' && msg.toyId"
        [routerLink]="['/toy', msg.toyId]"
        class="quick-link"
        (click)="open = false"
      >
        🔍 Open details
      </a>

      <a
        *ngIf="msg.action === 'openCart'"
        routerLink="/cart"
        class="quick-link"
        (click)="open = false"
      >
        🛒 Open cart
      </a>
    </div>
  </div>

  <div class="input-area">
    <input
      placeholder='Type: "search" or "order"...'
      [(ngModel)]="input"
      (keydown.enter)="send()"
    />
    <button (click)="send()">Send</button>
  </div>
</div>
