<header class="navbar">
  <div class="container nav-content">

    <a class="brand" routerLink="/">
      <img class="brand-icon" src="/bee-logo.png" alt="TwinkleBee" />
      <span class="brand-text">TwinkleBee</span>
    </a>

    <nav class="nav-links">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Home</a>
      <a routerLink="/shop" routerLinkActive="active">Shop</a>
      <a routerLink="/reserve" routerLinkActive="active">Reservation</a>
      <a routerLink="/about" routerLinkActive="active">About</a>
    </nav>

    <div class="nav-actions">

      <a routerLink="/cart" routerLinkActive="active" class="cart-link">
        Cart
        <span class="cart-badge" *ngIf="cartCount > 0" [class.bump]="animate">
          {{ cartCount }}
        </span>
      </a>

      <a *ngIf="!isLoggedIn" routerLink="/login" class="btn btn-ghost">
        Login
      </a>

      <a *ngIf="!isLoggedIn" routerLink="/signup" class="btn btn-primary">
        Create
      </a>

      <a *ngIf="isLoggedIn && !isAdmin" routerLink="/profile" class="btn btn-ghost">
        Profile
      </a>

      <a *ngIf="isAdmin" routerLink="/admin" class="btn btn-primary admin">
        Admin
      </a>

      <button *ngIf="isLoggedIn" (click)="logout()" class="btn btn-ghost danger">
        Logout
      </button>
    </div>

  </div>
</header>
